name: Build and Deploy Jekyll Site with Stripe Placeholders

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace placeholders with secrets
        env:
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          BUY_BUTTON_ID_SUPPORTER: ${{ secrets.BUY_BUTTON_ID_SUPPORTER }}
          BUY_BUTTON_ID_README: ${{ secrets.BUY_BUTTON_ID_README }}
          BUY_BUTTON_ID_WEBSITE: ${{ secrets.BUY_BUTTON_ID_WEBSITE }}
          BUY_BUTTON_ID_AFFILIATE: ${{ secrets.BUY_BUTTON_ID_AFFILIATE }}
          BUY_BUTTON_ID_LICENSE: ${{ secrets.BUY_BUTTON_ID_LICENSE }}
          BUY_BUTTON_ID_ADVISORY: ${{ secrets.BUY_BUTTON_ID_ADVISORY }}
          BUY_BUTTON_ID_55K: ${{ secrets.BUY_BUTTON_ID_55K }}
          BUY_BUTTON_ID_100K: ${{ secrets.BUY_BUTTON_ID_100K }}
          BUY_BUTTON_ID_30K: ${{ secrets.BUY_BUTTON_ID_30K }}
          STRIPE_CUSTOMER_PORTAL_URL: ${{ secrets.STRIPE_CUSTOMER_PORTAL_URL }}
        run: |
          set -e
          echo "Current directory: $(pwd)"
          
          # Debug: Show first 30 lines of pricing.md before changes
          echo "=== BEFORE REPLACEMENT (first 30 lines) ==="
          head -n 30 pricing.md
          
          # Process pricing.md – using perl for more reliable multiline and exact matching
          if [ -f pricing.md ]; then
            echo "Replacing placeholders in pricing.md..."
            
            # Use perl to replace exactly, handling any whitespace around braces
            perl -i -pe 's/\{\{STRIPE_PUBLISHABLE_KEY\}\}/$ENV{STRIPE_PUBLISHABLE_KEY}/g' pricing.md
            perl -i -pe 's/\{\{BUY_BUTTON_ID_SUPPORTER\}\}/$ENV{BUY_BUTTON_ID_SUPPORTER}/g' pricing.md
            perl -i -pe 's/\{\{BUY_BUTTON_ID_README\}\}/$ENV{BUY_BUTTON_ID_README}/g' pricing.md
            perl -i -pe 's/\{\{BUY_BUTTON_ID_WEBSITE\}\}/$ENV{BUY_BUTTON_ID_WEBSITE}/g' pricing.md
            perl -i -pe 's/\{\{BUY_BUTTON_ID_AFFILIATE\}\}/$ENV{BUY_BUTTON_ID_AFFILIATE}/g' pricing.md
            perl -i -pe 's/\{\{BUY_BUTTON_ID_LICENSE\}\}/$ENV{BUY_BUTTON_ID_LICENSE}/g' pricing.md
            perl -i -pe 's/\{\{BUY_BUTTON_ID_ADVISORY\}\}/$ENV{BUY_BUTTON_ID_ADVISORY}/g' pricing.md
            perl -i -pe 's/\{\{BUY_BUTTON_ID_55K\}\}/$ENV{BUY_BUTTON_ID_55K}/g' pricing.md
            perl -i -pe 's/\{\{BUY_BUTTON_ID_100K\}\}/$ENV{BUY_BUTTON_ID_100K}/g' pricing.md
            perl -i -pe 's/\{\{BUY_BUTTON_ID_30K\}\}/$ENV{BUY_BUTTON_ID_30K}/g' pricing.md
            
            echo "pricing.md processed."
          else
            echo "pricing.md not found!"
            exit 1
          fi

          # Debug: Show first 30 lines after replacement
          echo "=== AFTER REPLACEMENT (first 30 lines) ==="
          head -n 30 pricing.md
          
          # Process manage.md
          if [ -f manage.md ]; then
            echo "Replacing placeholders in manage.md..."
            perl -i -pe 's/\{\{STRIPE_CUSTOMER_PORTAL_URL\}\}/$ENV{STRIPE_CUSTOMER_PORTAL_URL}/g' manage.md
            echo "manage.md processed."
          else
            echo "manage.md not found, skipping."
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
          PAGES_REPO_NWO: isiahjonesSTEM/security-methodology

      - name: Upload built site as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
