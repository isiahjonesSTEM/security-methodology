name: Build and Deploy Jekyll Site with Stripe Placeholders

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace placeholders with secrets
        env:
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          # Monthly tiers
          BUY_BUTTON_ID_SUPPORTER: ${{ secrets.BUY_BUTTON_ID_SUPPORTER }}
          BUY_BUTTON_ID_README: ${{ secrets.BUY_BUTTON_ID_README }}
          BUY_BUTTON_ID_WEBSITE: ${{ secrets.BUY_BUTTON_ID_WEBSITE }}
          BUY_BUTTON_ID_AFFILIATE: ${{ secrets.BUY_BUTTON_ID_AFFILIATE }}
          BUY_BUTTON_ID_LICENSE: ${{ secrets.BUY_BUTTON_ID_LICENSE }}
          BUY_BUTTON_ID_ADVISORY: ${{ secrets.BUY_BUTTON_ID_ADVISORY }}
          # New one‑time tiers
          BUY_BUTTON_ID_55K: ${{ secrets.BUY_BUTTON_ID_55K }}
          BUY_BUTTON_ID_100K: ${{ secrets.BUY_BUTTON_ID_100K }}
          BUY_BUTTON_ID_30K: ${{ secrets.BUY_BUTTON_ID_30K }}
          # Manage page portal URL
          STRIPE_CUSTOMER_PORTAL_URL: ${{ secrets.STRIPE_CUSTOMER_PORTAL_URL }}
        run: |
          set -e
          echo "Current directory: $(pwd)"
          
          # Process pricing.md – monthly tiers
          if [ -f pricing.md ]; then
            echo "Replacing placeholders in pricing.md..."
            sed -i "s|{{STRIPE_PUBLISHABLE_KEY}}|$STRIPE_PUBLISHABLE_KEY|g" pricing.md
            sed -i "s|{{BUY_BUTTON_ID_SUPPORTER}}|$BUY_BUTTON_ID_SUPPORTER|g" pricing.md
            sed -i "s|{{BUY_BUTTON_ID_README}}|$BUY_BUTTON_ID_README|g" pricing.md
            sed -i "s|{{BUY_BUTTON_ID_WEBSITE}}|$BUY_BUTTON_ID_WEBSITE|g" pricing.md
            sed -i "s|{{BUY_BUTTON_ID_AFFILIATE}}|$BUY_BUTTON_ID_AFFILIATE|g" pricing.md
            sed -i "s|{{BUY_BUTTON_ID_LICENSE}}|$BUY_BUTTON_ID_LICENSE|g" pricing.md
            sed -i "s|{{BUY_BUTTON_ID_ADVISORY}}|$BUY_BUTTON_ID_ADVISORY|g" pricing.md
            # New one‑time tiers
            sed -i "s|{{BUY_BUTTON_ID_55K}}|$BUY_BUTTON_ID_55K|g" pricing.md
            sed -i "s|{{BUY_BUTTON_ID_100K}}|$BUY_BUTTON_ID_100K|g" pricing.md
            sed -i "s|{{BUY_BUTTON_ID_30K}}|$BUY_BUTTON_ID_30K|g" pricing.md
            echo "pricing.md processed."
          else
            echo "pricing.md not found!"
            exit 1
          fi

          # Process manage.md
          if [ -f manage.md ]; then
            echo "Replacing placeholders in manage.md..."
            sed -i "s|{{STRIPE_CUSTOMER_PORTAL_URL}}|$STRIPE_CUSTOMER_PORTAL_URL|g" manage.md
            echo "manage.md processed."
          else
            echo "manage.md not found, skipping."
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
          PAGES_REPO_NWO: isiahjonesSTEM/security-methodology

      - name: Upload built site as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
